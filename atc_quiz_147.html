, {"type": "mc", "text": "איך נברר מה אורך וכיוון המסלול ברמת דוד?", "options": ["נשאל את ברוך", "נשאל את מרחבי", "נסתכל בAIP", "דאבל קליק על רמת דוד בATMAS ושם יש מסלולים, תדרים, עזרי ניווט ועוד"], "correct": 3, "ref": "אטמס", "exp": ""}, {"type": "mc", "text": "העברנו EST לחיפה אך נראה שהוא לא תואם את המצב בשטח. מתי נצטרך לעדכן את הודעת הEST?", "options": ["בסטיה של 2 דק׳ ומעלה", "בסטיה של 3 דק׳ ומעלה", "בסטיה של 4 דק׳ ומעלה", "בסטיה של 5 דק׳ ומעלה"], "correct": 1, "ref": "DOC 7030", "exp": ""}];

let Qs=[...questions],cur=0,score=0,ans=false,sh=[];
function sh2(a){return[...a].sort(()=>Math.random()-.5);}
function startQ(){sh=sh2(Qs);cur=0;score=0;ans=false;showQ();}
function showQ(){
  const q=sh[cur];
  document.getElementById('qc').textContent='שאלה '+(cur+1)+' מתוך '+sh.length;
  document.getElementById('sc').textContent='ניקוד: '+score;
  document.getElementById('pf').style.width=((cur+1)/sh.length*100)+'%';
  document.getElementById('qb').textContent=q.type==='mc'?'MULTIPLE CHOICE':'נכון / לא נכון';
  document.getElementById('qt').textContent=q.text;
  document.getElementById('qr').textContent=q.ref?'מקור: '+q.ref:'';
  document.getElementById('fb').className='fb';
  document.getElementById('nx').className='nx';
  ans=false;
  const c=document.getElementById('oc');c.innerHTML='';
  if(q.type==='mc'){
    (q.options||[]).forEach((o,i)=>{
      if(!o&&o!==0)return;
      const b=document.createElement('button');
      b.className='ob';
      b.innerHTML='<span class="ok">'+['א','ב','ג','ד'][i]+'</span>'+o;
      b.onclick=()=>ansMC(i);
      c.appendChild(b);
    });
  } else {
    const g=document.createElement('div');g.className='tg';
    ['נכון','לא נכון'].forEach((l,i)=>{
      const b=document.createElement('button');
      b.className='tb2 '+(i===0?'tt':'tf');
      b.textContent=l;b.onclick=()=>ansTF(i===0);
      g.appendChild(b);
    });
    c.appendChild(g);
  }
}
function ansMC(i){
  if(ans)return;ans=true;
  const q=sh[cur];
  const bs=document.querySelectorAll('.ob');
  bs.forEach(b=>b.disabled=true);
  const ok=i===q.correct;
  bs[i].classList.add(ok?'correct':'wrong');
  if(!ok&&bs[q.correct])bs[q.correct].classList.add('rev');
  if(ok)score++;
  showFB(ok,q.exp);
}
function ansTF(v){
  if(ans)return;ans=true;
  const q=sh[cur];
  const bs=document.querySelectorAll('.tb2');
  bs.forEach(b=>b.disabled=true);
  const ok=v===q.correct;
  if(ok)score++;
  (v?bs[0]:bs[1]).classList.add(ok?'correct':'wrong');
  if(!ok)(q.correct?bs[0]:bs[1]).classList.add('correct');
  showFB(ok,q.exp);
}
function showFB(ok,exp){
  const fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'correct':'wrong');
  fb.textContent=(ok?'✓ נכון! ':'✗ לא נכון. ')+(exp||'');
  document.getElementById('nx').className='nx show';
}
function nextQ(){cur++;if(cur>=sh.length)showRes();else showQ();}
function showRes(){
  document.getElementById('qs').style.display='none';
  document.getElementById('rs').style.display='block';
  const p=Math.round(score/sh.length*100);
  document.getElementById('rsc').textContent=p+'%';
  const ms=[[0,'צריך לחזור על החומר...'],[40,'התחלה טובה'],[60,'סביר — יש מקום לשיפור'],[80,'כל הכבוד!'],[100,'מצוין! שליטה מלאה']];
  let m=ms[0][1];for(const[t,msg] of ms){if(p>=t)m=msg;}
  document.getElementById('rsm').textContent=m;
}
function restartQuiz(){
  document.getElementById('rs').style.display='none';
  document.getElementById('qs').style.display='block';
  startQ();
}
function goQ(){
  document.getElementById('n1').classList.add('on');document.getElementById('n2').classList.remove('on');
  document.getElementById('qs').style.display='block';
  document.getElementById('es').style.display='none';
  document.getElementById('rs').style.display='none';
  document.getElementById('pw').style.display='none';
  startQ();
}
function goEG(){
  document.getElementById('n2').classList.add('on');document.getElementById('n1').classList.remove('on');
  document.getElementById('qs').style.display='none';
  document.getElementById('rs').style.display='none';
  document.getElementById('pw').style.display='block';
  document.getElementById('es').style.display='none';
  document.getElementById('pwi').value='';
  document.getElementById('pwe').style.display='none';
  setTimeout(()=>document.getElementById('pwi').focus(),100);
}
function chkPW(){
  if(document.getElementById('pwi').value===PW){
    document.getElementById('pw').style.display='none';
    document.getElementById('es').style.display='block';
    renderQL();
  } else {
    document.getElementById('pwe').style.display='block';
    document.getElementById('pwi').value='';
  }
}
function renderQL(){
  document.getElementById('qcnt').textContent=Qs.length;
  const l=document.getElementById('ql');l.innerHTML='';
  Qs.forEach((q,i)=>{
    const d=document.createElement('div');d.className='qi';
    d.innerHTML='<span class="tyb '+(q.type==='mc'?'mc-b':'tf-b')+'">'+(q.type==='mc'?'MC':'T/F')+'</span><span class="qit">'+q.text.substring(0,65)+(q.text.length>65?'...':'')+'</span><button class="db" onclick="delQ('+i+')">✕</button>';
    l.appendChild(d);
  });
}
function delQ(i){if(confirm('למחוק?')){Qs.splice(i,1);renderQL();}}
function openM(){
  document.getElementById('mtitle').textContent='הוספת שאלה';
  document.getElementById('mtxt').value='';document.getElementById('mexp').value='';document.getElementById('mref').value='';
  document.getElementById('mtype').value='mc';
  document.querySelectorAll('.mi').forEach(x=>x.value='');
  document.querySelectorAll('input[name=cor]').forEach(r=>r.checked=false);
  togM();document.getElementById('mo').classList.add('open');
}
function closeM(){document.getElementById('mo').classList.remove('open');}
function togM(){
  const t=document.getElementById('mtype').value;
  document.getElementById('mc-sec').style.display=t==='mc'?'block':'none';
  document.getElementById('tf-sec').style.display=t==='tf'?'block':'none';
}
function saveQ(){
  const type=document.getElementById('mtype').value;
  const text=document.getElementById('mtxt').value.trim();
  const exp=document.getElementById('mexp').value.trim();
  const ref=document.getElementById('mref').value.trim();
  if(!text){alert('יש להזין טקסט');return;}
  let q={type,text,exp,ref};
  if(type==='mc'){
    const opts=[...document.querySelectorAll('.mi')].map(x=>x.value.trim());
    if(opts.some(o=>!o)){alert('יש למלא את כל 4 התשובות');return;}
    let cor=-1;document.querySelectorAll('input[name=cor]').forEach(r=>{if(r.checked)cor=parseInt(r.value);});
    if(cor===-1){alert('יש לסמן תשובה נכונה');return;}
    q.options=opts;q.correct=cor;
  } else {
    q.correct=document.getElementById('mtf').value==='true';
  }
  Qs.push(q);closeM();renderQL();
}
function expJ(){
  const b=new Blob([JSON.stringify(Qs,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='atc_questions.json';a.click();
}
function impJ(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d)){alert('קובץ לא תקין');return;}Qs=d;renderQL();alert('יובאו '+d.length+' שאלות');}
    catch{alert('שגיאה בקריאת הקובץ');}
  };
  r.readAsText(f);
}
function toggleTheme(){
  const r=document.getElementById('root');
  const d=r.dataset.theme==='dark';
  r.dataset.theme=d?'light':'dark';
  document.getElementById('tbtn').textContent=d?'☾':'☀';
}
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey&&e.key==='E'){e.preventDefault();goEG();}});
startQ();
</script>
